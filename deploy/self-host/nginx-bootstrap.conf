server {
    listen 80;
    listen [::]:80;
    server_name checkback.43-134-161-43.sslip.io;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/checkback-acme;
        default_type text/plain;
    }

    location / {
        return 302 https://$host$request_uri;
    }
}
