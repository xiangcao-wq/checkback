services:
  checkback:
    image: checkback:${CHECKBACK_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: checkback
    restart: unless-stopped
    init: true
    env_file:
      - /etc/checkback/checkback.env
    ports:
      - "127.0.0.1:3100:3000"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /app/.next/cache:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 1g
    cpus: 1.5
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
