geoip2 /etc/checkback/geoip/iptoasn-country.mmdb {
    auto_reload 1h;
    $checkback_country_code default=ZZ country_code;
}
server {
    listen 80;
    listen [::]:80;
    server_name checkback.43-134-161-43.sslip.io;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/checkback-acme;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name checkback.43-134-161-43.sslip.io;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/checkback.43-134-161-43.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkback.43-134-161-43.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    auth_basic "CheckBack Competition";
    auth_basic_user_file /etc/nginx/.htpasswd-checkback;

    client_max_body_size 1m;
    client_body_buffer_size 1m;
    limit_req_status 429;
    limit_conn_status 429;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; media-src 'self' blob:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    access_log /var/log/nginx/checkback.access.log combined;
    error_log /var/log/nginx/checkback.error.log warn;

    location ^~ /api/analyze {
        limit_req zone=checkback_api burst=2 nodelay;
        limit_conn checkback_connection 2;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_read_timeout 390s;
        proxy_send_timeout 210s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-CheckBack-Country $checkback_country_code;
        proxy_set_header Authorization "";
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-CheckBack-Country $checkback_country_code;
        proxy_set_header Authorization "";
        proxy_set_header Connection "";
    }
}
